<script>
let scale = 0.72, panX = 0, panY = 0;
let isDragging = false, startX, startY, startPanX, startPanY;
const canvas = document.getElementById('canvas');
const wrap = document.getElementById('canvas-wrap');
const zoomLbl = document.getElementById('zoom-level');

function applyTransform() {
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  zoomLbl.textContent = Math.round(scale*100)+'%';
}
function zoom(d) {
  const ns = Math.min(3, Math.max(0.15, scale+d));
  const cx = wrap.clientWidth/2, cy = wrap.clientHeight/2;
  panX = cx-(cx-panX)*(ns/scale);
  panY = cy-(cy-panY)*(ns/scale);
  scale = ns; applyTransform();
}
function resetView() { scale=0.72; panX=0; panY=0; applyTransform(); }

wrap.addEventListener('mousedown', e => {
  isDragging=true; startX=e.clientX; startY=e.clientY; startPanX=panX; startPanY=panY;
  wrap.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if(!isDragging) return;
  panX=startPanX+(e.clientX-startX); panY=startPanY+(e.clientY-startY); applyTransform();
});
document.addEventListener('mouseup', ()=>{ isDragging=false; wrap.classList.remove('dragging'); });
wrap.addEventListener('touchstart', e=>{
  if(e.touches.length===1){ isDragging=true; startX=e.touches[0].clientX; startY=e.touches[0].clientY; startPanX=panX; startPanY=panY; }
},{passive:true});
wrap.addEventListener('touchmove', e=>{
  if(!isDragging||e.touches.length!==1) return;
  panX=startPanX+(e.touches[0].clientX-startX); panY=startPanY+(e.touches[0].clientY-startY); applyTransform();
},{passive:true});
wrap.addEventListener('touchend', ()=>{ isDragging=false; });
wrap.addEventListener('wheel', e=>{
  e.preventDefault();
  const d=e.deltaY>0?-0.1:0.1;
  const r=wrap.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;

  panX=mx-(mx-panX)*(ns/scale); panY=my-(my-panY)*(ns/scale);
