<script>
let scale = 0.72;
let panX = 0, panY = 0;
let isDragging = false, startX, startY, startPanX, startPanY;
const canvas = document.getElementById('canvas');
const wrap = document.getElementById('canvas-wrap');
const zoomLbl = document.getElementById('zoom-level');

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  zoomLbl.textContent = Math.round(scale * 100) + '%';
}

function zoom(delta) {
  const newScale = Math.min(3, Math.max(0.2, scale + delta));
  // Zoom toward center
  const cx = wrap.clientWidth / 2;
  const cy = wrap.clientHeight / 2;
  panX = cx - (cx - panX) * (newScale / scale);
  panY = cy - (cy - panY) * (newScale / scale);
  scale = newScale;
  applyTransform();
}

function resetView() {
  scale = 0.72;
  panX = 0; panY = 0;
  applyTransform();
}

// Mouse drag
wrap.addEventListener('mousedown', e => {
  isDragging = true;
  startX = e.clientX; startY = e.clientY;
  startPanX = panX; startPanY = panY;
  wrap.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  panX = startPanX + (e.clientX - startX);
  panY = startPanY + (e.clientY - startY);
  applyTransform();
});
document.addEventListener('mouseup', () => { isDragging = false; wrap.classList.remove('dragging'); });

// Touch drag
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startPanX = panX; startPanY = panY;
  }
}, {passive: true});
wrap.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  panX = startPanX + (e.touches[0].clientX - startX);
  panY = startPanY + (e.touches[0].clientY - startY);
  applyTransform();
}, {passive: true});
wrap.addEventListener('touchend', () => { isDragging = false; });

// Scroll to zoom
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.1 : 0.1;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const newScale = Math.min(3, Math.max(0.2, scale + delta));
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, {passive: false});

function showFloor(floor, el) {
  document.querySelectorAll('.floor').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('floor-' + floor).classList.add('active');
  el.classList.add('active');
  resetView();
}

// Init
applyTransform();
</script>
