<script>
/* ================= view control (pan / zoom / pinch / tap) ================= */
const cv=document.getElementById('cv'),wr=document.getElementById('wrap'),zl=document.getElementById('zlbl'),tt=document.getElementById('tt');
const CW=1560, CH=1000, SVGNS='http://www.w3.org/2000/svg';
let sc=0.5, tx=0, ty=0, currentFloor='main', lastTapSvg=null;
function apply(){cv.style.transform='translate('+tx+'px,'+ty+'px) scale('+sc+')';zl.textContent=Math.round(sc*100)+'%';}
function fitView(){const w=wr.clientWidth,h=wr.clientHeight;sc=Math.min(w/CW,h/CH)*0.98;tx=(w-CW*sc)/2;ty=Math.max(6,(h-CH*sc)/2);apply();}
function rst(){fitView();}
function zmAt(f,cx,cy){const ns=Math.min(4,Math.max(.08,sc*f));tx=cx-(cx-tx)*(ns/sc);ty=cy-(cy-ty)*(ns/sc);sc=ns;apply();}
function zm(d){const r=wr.getBoundingClientRect();zmAt(d>0?1.2:1/1.2,r.width/2,r.height/2);}
const pts=new Map();
let panStart=null,startTx=0,startTy=0,downPt=null,downTime=0,moved=0,pinchDist=0,pinchSc=1,pinchMid=null;
wr.addEventListener('pointerdown',e=>{try{wr.setPointerCapture(e.pointerId);}catch(_){}pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===1){panStart={x:e.clientX,y:e.clientY};startTx=tx;startTy=ty;downPt={x:e.clientX,y:e.clientY};downTime=Date.now();moved=0;wr.classList.add('drag');}
  else if(pts.size===2){const a=[...pts.values()];pinchDist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);pinchSc=sc;const r=wr.getBoundingClientRect();pinchMid={x:(a[0].x+a[1].x)/2-r.left,y:(a[0].y+a[1].y)/2-r.top};panStart=null;}});
wr.addEventListener('pointermove',e=>{if(pts.has(e.pointerId))pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===2){const a=[...pts.values()];const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);if(pinchDist>0){const ns=Math.min(4,Math.max(.08,pinchSc*d/pinchDist));tx=pinchMid.x-(pinchMid.x-tx)*(ns/sc);ty=pinchMid.y-(pinchMid.y-ty)*(ns/sc);sc=ns;apply();}moved=999;return;}
  if(panStart&&pts.has(e.pointerId)){const dx=e.clientX-panStart.x,dy=e.clientY-panStart.y;moved=Math.max(moved,Math.abs(dx)+Math.abs(dy));tx=startTx+dx;ty=startTy+dy;apply();return;}
  if(e.pointerType==='mouse'&&pts.size===0){const room=roomAt(e.clientX,e.clientY);if(room){tt.innerHTML='<strong style="color:#00d4ff">'+(room.dataset.label||'')+'</strong><br>'+(room.dataset.dim||'').split('|').join('<br>');tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-10)+'px';}else{tt.style.display='none';}}});
function endPtr(e){pts.delete(e.pointerId);if(pts.size<2)pinchDist=0;
  if(pts.size===0){wr.classList.remove('drag');if(downPt&&moved<10&&Date.now()-downTime<500){handleTap(downPt.x,downPt.y);}panStart=null;downPt=null;}
  else if(pts.size===1){const a=[...pts.values()][0];panStart={x:a.x,y:a.y};startTx=tx;startTy=ty;}}
wr.addEventListener('pointerup',endPtr);wr.addEventListener('pointercancel',endPtr);
wr.addEventListener('wheel',e=>{e.preventDefault();const r=wr.getBoundingClientRect();zmAt(e.deltaY<0?1.12:1/1.12,e.clientX-r.left,e.clientY-r.top);},{passive:false});
window.addEventListener('resize',fitView);
function roomAt(x,y){const el=document.elementFromPoint(x,y);return el&&el.closest?el.closest('.room'):null;}
function clientToSvg(floor,cx,cy){const svg=document.querySelector('#floor-'+floor+' svg');if(!svg||!svg.getScreenCTM)return null;const p=svg.createSVGPoint();p.x=cx;p.y=cy;const m=svg.getScreenCTM();if(!m)return null;const q=p.matrixTransform(m.inverse());return{x:q.x,y:q.y};}
function handleTap(x,y){const el=document.elementFromPoint(x,y);if(!el)return;
  const pin=el.closest?el.closest('[data-note-id]'):null;if(pin){openNoteFromPin(+pin.getAttribute('data-note-id'));return;}
  const room=el.closest?el.closest('.room'):null;if(room){const p=clientToSvg(currentFloor,x,y);lastTapSvg=p?{floor:currentFloor,x:Math.round(p.x),y:Math.round(p.y)}:null;selectRoom(room.dataset.label||'');}}
function show(f,el){document.querySelectorAll('.fl').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.getElementById('floor-'+f).classList.add('on');el.classList.add('active');currentFloor=f;fitView();renderPins();}

/* SETUP (Kelly): paste your Firebase Realtime DB URL below to sync with your wife
   (REST, no SDK). Leave "" for device-only + Copy All. */
const FIREBASE_URL = "https://house-floor-plan-855a8-default-rtdb.firebaseio.com";
const NOTES_PATH = "/barndo_floorplan_notes.json";

function setWho(n){who=n;document.getElementById('whoK').classList.toggle('sel',n==='Kelly');document.getElementById('whoW').classList.toggle('sel',n!=='Kelly');}
function togglePanel(){document.getElementById('noteWrap').classList.toggle('open');}
function setSync(m){document.getElementById('syncStat').textContent=m;}
function setSyncLight(state){var d=document.getElementById('syncLight');if(!d)return;d.className='sync-dot '+state;d.title='Sync: '+({saving:'saving\u2026',saved:'saved (synced)',local:'saved on this device only',error:'save failed'}[state]||state);}
function selectRoom(label){document.getElementById('noteRoom').value=label;if(!document.getElementById('noteWrap').classList.contains('open'))togglePanel();setTimeout(()=>document.getElementById('noteText').focus(),60);}
async function loadNotes(){
  if(FIREBASE_URL){try{const r=await fetch(FIREBASE_URL+NOTES_PATH,{cache:'no-store'});const d=await r.json();notes=Array.isArray(d)?d.filter(Boolean):(d?Object.values(d):[]);setSync('Synced via Firebase (auto-refresh on)');setSyncLight('saved');}catch(e){setSync('Firebase unreachable - local only');setSyncLight('error');}}
  else{try{const s=localStorage.getItem('barndo_notes');if(s)notes=JSON.parse(s);setSync('Saved on this device (set FIREBASE_URL to sync)');}catch(e){setSync('Session only - use Copy All to share');}setSyncLight('local');}
  renderNotes();renderPins();
}
async function saveNotes(){
  setSyncLight('saving');
  if(FIREBASE_URL){try{await fetch(FIREBASE_URL+NOTES_PATH,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(notes)});setSync('Saved to Firebase');setSyncLight('saved');}catch(e){setSync('Save failed - use Copy All');setSyncLight('error');}}
  else{try{localStorage.setItem('barndo_notes',JSON.stringify(notes));setSyncLight('local');}catch(e){setSyncLight('error');}}
  renderNotes();renderPins();
}
function refreshNotes(){loadNotes();}
function addNote(){const room=document.getElementById('noteRoom').value.trim();const text=document.getElementById('noteText').value.trim();if(!text){document.getElementById('noteText').focus();return;}
  const n={id:Date.now(),who:who,room:room||'General',text:text,ts:new Date().toLocaleString(),done:false};if(lastTapSvg)n.pos=lastTapSvg;
  notes.unshift(n);lastTapSvg=null;document.getElementById('noteText').value='';document.getElementById('noteRoom').value='';saveNotes();}
function toggleDone(id){const n=notes.find(x=>x.id===id);if(n){n.done=!n.done;saveNotes();}}
function delNote(id){notes=notes.filter(x=>x.id!==id);saveNotes();}
function clearDone(){notes=notes.filter(x=>!x.done);saveNotes();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderNotes(){const L=document.getElementById('noteList');document.getElementById('nCount').textContent=notes.filter(n=>!n.done).length;
  if(!notes.length){L.innerHTML='<div style="color:#555;font-size:.75rem;text-align:center;padding:20px 0">No change requests yet.<br>Tap a room + add the first one!</div>';return;}
  L.innerHTML=notes.map(n=>'<div class="note '+(n.done?'done ':'')+(n.who==='Kelly'?'k':'')+'" id="note-'+n.id+'"><div class="nmeta"><span class="nwho2">'+esc(n.who)+'</span><span class="nroom2">'+esc(n.room)+'</span>'+(n.pos?'<span style="color:#27ae60">&#128205; pinned</span>':'')+'<span>'+esc(n.ts)+'</span></div><div class="ntext">'+esc(n.text)+'</div><div class="nacts"><button onclick="toggleDone('+n.id+')">'+(n.done?'Reopen':'Done')+'</button><button onclick="delNote('+n.id+')">Delete</button></div></div>').join('');}
function renderPins(){document.querySelectorAll('.pinLayer').forEach(n=>n.remove());const svg=document.querySelector('#floor-'+currentFloor+' svg');if(!svg)return;
  const g=document.createElementNS(SVGNS,'g');g.setAttribute('class','pinLayer');let i=0;
  notes.forEach(n=>{if(n.done||!n.pos||n.pos.floor!==currentFloor)return;i++;
    const gg=document.createElementNS(SVGNS,'g');gg.setAttribute('data-note-id',n.id);
    const c=document.createElementNS(SVGNS,'circle');c.setAttribute('cx',n.pos.x);c.setAttribute('cy',n.pos.y);c.setAttribute('r',13);c.setAttribute('fill',n.who==='Kelly'?'#00d4ff':'#e91e63');c.setAttribute('stroke','#fff');c.setAttribute('stroke-width','2');c.setAttribute('opacity','.92');
    const t=document.createElementNS(SVGNS,'text');t.setAttribute('x',n.pos.x);t.setAttribute('y',n.pos.y+4);t.setAttribute('text-anchor','middle');t.setAttribute('font-size','13');t.setAttribute('font-weight','700');t.setAttribute('fill','#111');t.textContent=i;
    gg.appendChild(c);gg.appendChild(t);g.appendChild(gg);});
  svg.appendChild(g);}
function openNoteFromPin(id){if(!document.getElementById('noteWrap').classList.contains('open'))togglePanel();
  setTimeout(()=>{const el=document.getElementById('note-'+id);if(el){el.scrollIntoView({block:'center'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1600);}},80);}
function copyNotes(){const t=notes.map(n=>'['+(n.done?'DONE':'OPEN')+'] '+n.who+' - '+n.room+(n.pos?' (pinned)':'')+' ('+n.ts+')\n'+n.text).join('\n\n');const full='BARNDO FLOOR PLAN - CHANGE REQUESTS\n\n'+(t||'(none)');if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(full).then(()=>setSync('Copied - paste into a text to share')).catch(()=>setSync('Copy failed'));}else{const ta=document.createElement('textarea');ta.value=full;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');setSync('Copied');}catch(e){}ta.remove();}}

function showHistory(){var b=document.getElementById('updateBar');if(b)b.style.visibility='hidden';var out='';if(pendingV && parseInt(pendingV,10)>parseInt(APP_VERSION,10)){var body=(pendingItems&&pendingItems.length)?('<ul>'+pendingItems.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul>'):('<ul><li>'+(pendingClog||'A newer version is available.')+'</li></ul>');out+='<div class="hv pending"><h3>&#128293; Coming in v'+pendingV+' &#8212; not yet installed</h3>'+body+'<button class="ub-go" onclick="doRefresh()">Refresh to install v'+pendingV+'</button></div>';out+='<div class="histsep">Installed history (you have v'+APP_VERSION+')</div>';}out+=CHANGELOG.map(function(e){return '<div class="hv"><h3>v'+e.v+(e.v===APP_VERSION?'  (current)':'')+'</h3><ul>'+e.items.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul></div>';}).join('');document.getElementById('histList').innerHTML=out;document.getElementById('histWrap').classList.add('open');}
function hideHistory(){document.getElementById('histWrap').classList.remove('open');var b=document.getElementById('updateBar');if(b)b.style.visibility='';}
function showUpdateBanner(latest,clog){var s=document.getElementById('ubSub');if(s)s.textContent=(clog?clog:'Refresh to load the latest plan')+(latest&&latest!=='demo'?'  ('+'v'+latest+')':'');var b=document.getElementById('updateBar');b.setAttribute('data-v',latest||'');b.classList.add('show');}
function dismissUpdate(){var b=document.getElementById('updateBar');dismissedV=b.getAttribute('data-v')||dismissedV;b.classList.remove('show');}
function doRefresh(){dismissUpdate();var u=location.href.split('#')[0].split('?')[0]+'?r='+Date.now();location.href=u;}
var dismissedV=null,pendingV=null,pendingClog=null,pendingItems=null;
async function checkVersion(){
  if(location.search.indexOf('demoUpdate')>-1){showUpdateBanner('demo','PREVIEW only - remove ?demoUpdate=1 from the URL.');return;}
  var latest=null,clog=null;
  if(FIREBASE_URL){
    try{const r=await fetch(FIREBASE_URL+VERSION_PATH,{cache:'no-store'});const v=await r.json();if(v!==null&&v!==undefined)latest=String(v);}catch(e){}
    try{const r2=await fetch(FIREBASE_URL+CHANGELOG_PATH,{cache:'no-store'});const c=await r2.json();if(c)clog=String(c);}catch(e){}
  }
  if(latest===null){
    try{const u=location.href.split('#')[0].split('?')[0]+'?v='+Date.now();
        const r=await fetch(u,{cache:'no-store'});const t=await r.text();
        const m=t.match(/BARNDO_APP_VERSION=([\w.\-]+)/);if(m)latest=m[1];
        const mc=t.match(/BARNDO_CHANGELOG=([^>]*?)-->/);if(mc)clog=mc[1].trim();
        const ce=t.match(/\{v:"([\w.\-]+)",items:\[([\s\S]*?)\]\}/);if(ce){pendingItems=(ce[2].match(/"([^"]*)"/g)||[]).map(function(s){return s.slice(1,-1);});}
    }catch(e){}
  }
  /* only alert when the deployed version is strictly NEWER (prevents stale-cache false alarms) */
  var cur=parseInt(APP_VERSION,10), lv=parseInt(latest,10);
  if(latest && !isNaN(lv) && !isNaN(cur) && lv>cur){pendingV=String(latest);pendingClog=clog;if(String(latest)!==dismissedV)showUpdateBanner(String(latest),clog);}
}


function floorTotalSqft(floorId){
  var svg=document.querySelector('#floor-'+floorId+' svg'); if(!svg)return null;
  var excl=/OPEN TO BELOW|WING BELOW|PORCH|DECK|PATIO|COURTYARD/i, rects=[];
  svg.querySelectorAll('g.room').forEach(function(g){
    var lbl=g.getAttribute('data-label')||''; if(excl.test(lbl))return;
    var r=g.querySelector('rect'); if(!r)return;
    var x=+r.getAttribute('x'),y=+r.getAttribute('y'),w=+r.getAttribute('width'),hh=+r.getAttribute('height');
    if(!w||!hh)return; rects.push({x:x,y:y,w:w,h:hh,x2:x+w,y2:y+hh,a:w*hh});
  });
  var total=0;
  rects.forEach(function(r,i){
    var contained=rects.some(function(o,j){return j!==i && o.a>r.a && r.x>=o.x-1 && r.y>=o.y-1 && r.x2<=o.x2+1 && r.y2<=o.y2+1;});
    if(!contained) total+=r.a;
  });
  return Math.round(total/81);
}
function setFloorTotals(){
  var m=document.getElementById('floorTotal-main'); if(m){var mt=floorTotalSqft('main'); if(mt)m.textContent='MAIN FLOOR: ~'+mt.toLocaleString()+' sq ft under roof';}
  var u=document.getElementById('floorTotal-upper'); if(u){var ut=floorTotalSqft('upper'); if(ut)u.textContent='UPPER FLOOR: ~'+ut.toLocaleString()+' sq ft finished';}
}
