   REREAD: "Move bedroom 2 and 3 and that bathroom to the man cave area. 
            Leave room where bedrooms were open. Move Man cave over garage."
   
   So the upper floor west zone (above garage, x=60..384) splits:
     - Bottom portion: MAN CAVE (above garage center/south) 
     - The bedrooms were previously in upper RIGHT (x=510..708)
     - Move them to upper LEFT zone (x=60..510 area, but above garage = x=60..384)
   
   Let me think about this differently:
   UPPER LEFT footprint above garage: x=60..384, y=60..450 (38' wide × 43' deep)
   This needs to fit:
     - Man Cave (theater + hangout)
     - Bedrooms 2 & 3 (14'×17' each)
     - Shared Bath (20'×11')
     - Cave Bath (12'×11')
   
   Total SF needed: ~1,200 + 238 + 238 + 220 + 132 = ~2,028 sf
   Available above garage: 38'×43' = 1,634 sf. Not enough.
   
   Solution: Extend the bedroom wing into center zone too.
   Upper left (above garage): x=60..384 → Man Cave only (pure acoustic zone above garage)
   Bedroom wing: x=60..510, y=60..270 (stacked ABOVE man cave, northern portion)
   
   Actually the cleanest interpretation:
   - Man Cave: x=60..384 (above garage) — full 38'×43'
   - Bedrooms: tucked into NW corner ABOVE/adjacent to man cave
     Since we can't go higher than the house footprint, put bedrooms WITHIN the left zone
     by splitting: Man Cave takes south 27' (y=180..450), Bedrooms take north 13' (y=60..180)
     That's too shallow for bedrooms.
   
   PRACTICAL SOLUTION:
   Upper floor left zone x=60..510 (50' wide):
     Man Cave: x=60..384, y=234..450 (38'×24') — south portion, directly above garage
     Bedroom 2: x=60..186, y=60..234 (14'×19')

   Bedrooms can be north of man cave (y=60..234) sharing the same x range.
   
   FINAL UPPER FLOOR LAYOUT:
   
   WEST ZONE (x=60..510):
     North strip y=60..216 (17' deep):
       BR2:      x=60..186,  y=60..216  (14'×17' = 238 sf) ✓
       BR3:      x=186..312, y=60..216  (14'×17' = 238 sf) ✓  
       BR Bath:  x=312..510, y=60..216  (22'×17' = 374 sf) — generous shared bath
     
     South strip y=216..450 (26' deep) = MAN CAVE:
       Man Cave: x=60..510,  y=216..450 (50'×26' = 1,300 sf) — above garage + center
         (garage is x=60..384; extending man cave to x=510 puts part above stair/hall area)
         OR keep man cave strictly above garage: x=60..384, y=216..450 (38'×26' = 988 sf)
         Add hangout wing: x=384..510, y=216..450 (14'×26' = 364 sf)
         TOTAL man cave: 1,352 sf. Good.
       Cave Bath: x=60..168, y=216..324 (12'×12') — NW corner of man cave
   
   EAST ZONE (x=510..960):
     OPEN LOFT / VOID: x=510..960, y=60..450 (50'×43' = 2,150 sf)
     This is what was the bedroom area — now fully open, overlooking living below.
     Could have: overlook railing, reading nook, exercise area, flex space.
     Open above living room (north bank of windows visible from loft).
   
   STAIR: x=402..510, y=360..450 → landing at top of stair

   WHEELCHAIR ACCESSIBILITY:
   Main floor:
   - All doorways ≥ 36" wide (noted)
   - No steps anywhere on main floor

SCALE: 9px = 1ft

<script>
let sc=0.72,px=0,py=0,drag=false,sx,sy,spx,spy;
const cv=document.getElementById('cv'),wr=document.getElementById('wrap'),zl=document.getElementById('zlbl'),tt=document.getElementById('tt');
function aT(){cv.style.transform=`translate(${px}px,${py}px) scale(${sc})`;zl.textContent=Math.round(sc*100)+'%';}
function zm(d){const ns=Math.min(3,Math.max(.15,sc+d)),cx=wr.clientWidth/2,cy=wr.clientHeight/2;px=cx-(cx-px)*(ns/sc);py=cy-(cy-py)*(ns/sc);sc=ns;aT();}
function rst(){sc=0.72;px=0;py=0;aT();}
wr.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sy=e.clientY;spx=px;spy=py;wr.classList.add('drag');});
document.addEventListener('mousemove',e=>{if(!drag)return;px=spx+(e.clientX-sx);py=spy+(e.clientY-sy);aT();});
document.addEventListener('mouseup',()=>{drag=false;wr.classList.remove('drag');});
wr.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?-.1:.1,r=wr.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,ns=Math.min(3,Math.max(.15,sc+d));px=mx-(mx-px)*(ns/sc);py=my-(my-py)*(ns/sc);sc=ns;aT();},{passive:false});
wr.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;spx=px;spy=py;}},{passive:true});
wr.addEventListener('touchmove',e=>{if(!drag||e.touches.length!==1)return;px=spx+(e.touches[0].clientX-sx);py=spy+(e.touches[0].clientY-sy);aT();},{passive:true});
wr.addEventListener('touchend',()=>{drag=false;});
function show(f,el){document.querySelectorAll('.fl').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.getElementById('floor-'+f).classList.add('on');el.classList.add('active');rst();}
document.querySelectorAll('.room').forEach(g=>{
  g.style.cursor='pointer';
  g.addEventListener('mouseenter',()=>{
    const lbl=g.dataset.label||'',dim=g.dataset.dim||'';
    tt.innerHTML='<strong style="color:#00d4ff">'+lbl+'</strong><br>'+dim.replace(/\|/g,'<br>');
    tt.style.display='block';
  });
  g.addEventListener('mousemove',e=>{tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-10)+'px';});
  g.addEventListener('mouseleave',()=>{tt.style.display='none';});
});
aT();
